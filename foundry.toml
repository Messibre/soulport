[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "contracts/out"
libs = ["contracts/lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "." }]

[fmt]
line_length = 100
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true
