services:
  - type: web
    name: soulport-backend
    env: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/soulport.db
      - key: CORS_ORIGIN
        sync: false
      - key: WORLDCOIN_APP_ID
        sync: false
      - key: WORLDCOIN_ACTION
        sync: false
      - key: PINATA_JWT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: soulport-backend-data
      mountPath: /var/data
      sizeGB: 1
